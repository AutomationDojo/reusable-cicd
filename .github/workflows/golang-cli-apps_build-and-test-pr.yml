# Reusable workflow for building and testing Go projects on PRs.
# The caller must set `permissions: contents: read, pull-requests: read`.
name: Build and Test on PR

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Go version file to use"
        type: string
        default: "go.mod"
      go-sum-file:
        description: "Go sum file to use"
        type: string
        default: "go.sum"
      golangci-lint-version:
        description: "golangci-lint version to use"
        type: string
        default: "latest"
      pre-test:
        description: "Shell script to run before tests (e.g. to install envtest binaries or other test dependencies)"
        type: string
        default: ""
      test-cmd:
        description: "Command to run tests. Defaults to 'go test -v ./...'"
        type: string
        default: "go test -v ./..."
      build-cmd:
        description: "Command to build the project. Defaults to 'go build -v'"
        type: string
        default: "go build -v"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache-dependency-path: ${{ inputs.go-sum-file }}

      - name: Pre-test setup
        if: inputs.pre-test != ''
        run: ${{ inputs.pre-test }}

      - name: Run tests
        run: ${{ inputs.test-cmd }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci-lint-version }}

      - name: Build
        run: ${{ inputs.build-cmd }}
