# Reusable workflow for linting, type-checking, and building Node.js projects on PRs.
# The caller must set `permissions: contents: read, pull-requests: read`.
name: Node Build and Test on PR

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version (e.g. '20', '22')"
        type: string
        default: "20"
      cache:
        description: "Package manager for dependency cache (npm, yarn, or pnpm)"
        type: string
        default: "npm"
      lint-cmd:
        description: "Command to run lint (e.g. npm run lint)"
        type: string
        default: "npm run lint"
      typecheck-cmd:
        description: "Command to run type check (e.g. npx tsc --noEmit)"
        type: string
        default: "npx tsc --noEmit"
      skip-typecheck:
        description: "Skip the type check step (e.g. for JS-only projects)"
        type: boolean
        default: false
      build-cmd:
        description: "Command to run build (e.g. npm run build)"
        type: string
        default: "npm run build"

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: ${{ inputs.lint-cmd }}

      - name: Run Type Check
        if: inputs.skip-typecheck != true
        run: ${{ inputs.typecheck-cmd }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: ${{ inputs.build-cmd }}
