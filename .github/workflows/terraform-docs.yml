# Reusable workflow for generating Terraform module documentation.
# The caller must set `permissions: contents: write, pull-requests: write`.
name: Generate Terraform Docs

on:
  workflow_call:
    inputs:
      modules-path:
        description: "Top-level directory containing Terraform modules"
        type: string
        default: "modules"
      output-file:
        description: "Name of the generated docs file inside each module"
        type: string
        default: "README.md"
      output-method:
        description: "terraform-docs output method (inject, replace, print)"
        type: string
        default: "inject"
      git-commit-message:
        description: "Commit message prefix for docs updates"
        type: string
        default: "docs: update terraform-docs"

concurrency:
  group: terraform-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-modules:
    name: Detect changed Terraform modules
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build module matrix
        id: set-matrix
        env:
          MODULES_PATH: ${{ inputs.modules-path }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED_MODULES=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
            | grep "^${MODULES_PATH}/" \
            | cut -d/ -f2 \
            | sort -u)

          if [ -z "$CHANGED_MODULES" ]; then
            echo 'matrix={"module":[]}' >> "$GITHUB_OUTPUT"
            echo 'has-changes=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_JSON=$(echo "$CHANGED_MODULES" | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix={\"module\":$MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo 'has-changes=true' >> "$GITHUB_OUTPUT"

  docs:
    name: Terraform Docs — ${{ matrix.module }}
    needs: detect-modules
    if: needs.detect-modules.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect-modules.outputs.matrix) }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase

      - name: Render terraform docs for ${{ matrix.module }}
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: ${{ inputs.modules-path }}/${{ matrix.module }}
          output-file: ${{ inputs.output-file }}
          output-method: ${{ inputs.output-method }}
          git-push: true
          git-commit-message: "${{ inputs.git-commit-message }} for ${{ matrix.module }}"
