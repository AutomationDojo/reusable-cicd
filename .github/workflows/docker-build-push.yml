# Reusable workflow for building and pushing Docker images to GHCR.
# The caller must set `permissions: contents: read` and `packages: write`.
# Typically called after a release workflow, passing the new version.
name: Docker Build and Push

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (without 'v' prefix) used for tag and checkout ref"
        type: string
        required: true
      context:
        description: "Docker build context path"
        type: string
        default: "."
      platforms:
        description: "Comma-separated list of platforms to build"
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Whether to push the image to the registry"
        type: boolean
        default: true

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: |
            ghcr.io/${{ github.repository }}:v${{ inputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
