# Reusable workflow for building and pushing Docker images to GHCR.
# The caller must set `permissions: contents: read` and `packages: write`.
# Typically called after a release workflow, passing the new version.
name: Docker Build and Push

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (without 'v' prefix) used for tag and checkout ref"
        type: string
        required: true
      context:
        description: "Docker build context path"
        type: string
        default: "."
      platforms:
        description: "Comma-separated list of platforms to build"
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Whether to push the image to the registry"
        type: boolean
        default: true

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          platforms: ${{ matrix.platform }}
          push: ${{ inputs.push }}
          tags: |
            ghcr.io/${{ github.repository }}:v${{ inputs.version }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    name: Create Multi-Arch Manifest
    needs: build
    runs-on: ubuntu-latest
    if: inputs.push == true
    permissions:
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:v${{ inputs.version }} \
            -t ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:v${{ inputs.version }}-amd64 \
            ghcr.io/${{ github.repository }}:v${{ inputs.version }}-arm64