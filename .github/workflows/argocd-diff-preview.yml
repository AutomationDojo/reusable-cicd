# Reusable workflow: Argo CD manifest diff on PRs (argocd-diff-preview).
# Callers need pull-requests: write and secret GH_PAT (repo read).
# Details: docs/workflows/argocd-diff-preview.md
name: ArgoCD Diff Preview

on:
  workflow_call:
    inputs:
      repo_path:
        description: Directory of Application YAML when not using Helm pre-render
        required: false
        type: string
        default: '.'
      helm_chart_path:
        description: Helm chart path for pre-render; empty copies repo_path only
        required: false
        type: string
        default: ''
      helm_values_files:
        description: Space-separated values files for helm template
        required: false
        type: string
        default: ''
      base_branch:
        description: Branch to diff against
        required: false
        type: string
        default: 'main'
      argocd_version:
        description: Pin Argo CD Helm chart version; empty uses latest
        required: false
        type: string
        default: ''
      timeout:
        description: argocd-diff-preview timeout in seconds
        required: false
        type: number
        default: 300
      argocd_config_dir:
        description: Repo-relative dir (PR branch) mounted as /argocd-config (custom Argo CD Helm values)
        required: false
        type: string
        default: ''
      render_method:
        description: argocd-diff-preview render method (cli | server-api | repo-server-api)
        required: false
        type: string
        default: ''
      traverse_app_of_apps:
        description: Experimental app-of-apps expansion (needs repo-server-api)
        required: false
        type: boolean
        default: false
      file_regex:
        description: Optional --file-regex for argocd-diff-preview
        required: false
        type: string
        default: ''
      max_diff_length:
        description: Max characters in diff.md before argocd-diff-preview truncates (PR comment text is split to fit GitHub API)
        required: false
        type: number
        default: 1048576
      reusable_cicd_ref:
        description: Ref for shallow checkout of AutomationDojo/reusable-cicd (loads PR comment script only)
        required: false
        type: string
        default: 'main'
    secrets:
      GH_PAT:
        description: PAT with repo read for argocd-diff-preview GitHub API
        required: true
      SSH_PRIVATE_KEY:
        description: Optional SSH key for private Git clone in Argo CD
        required: false
      REPO_SSH_URL:
        description: Optional SSH repo URL when using SSH_PRIVATE_KEY
        required: false
      SOPS_AGE_KEY:
        description: Optional SOPS age key (helm-secrets) for ephemeral Argo CD
        required: false

jobs:
  diff:
    name: ArgoCD Diff Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target branch (PR)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      # workflow_call uses the caller repo as workspace; ./.github/actions would be wrong.
      # Composites are pinned to @main; for local tests of action changes, temporarily use your branch.
      - uses: AutomationDojo/reusable-cicd/.github/actions/argocd-diff-helm-template@fix/argocd-diff
        with:
          helm_chart_path: ${{ inputs.helm_chart_path }}
          helm_values_files: ${{ inputs.helm_values_files }}
          repo_path: ${{ inputs.repo_path }}
          output_dir: /tmp/argocd-diff/target

      - name: Stage Argo CD Helm values from PR branch
        if: inputs.argocd_config_dir != ''
        env:
          SRC_DIR: ${{ inputs.argocd_config_dir }}
        run: |
          if [[ -d "$SRC_DIR" ]]; then
            rm -rf /tmp/argocd-diff/argocd-config-custom
            cp -a "$SRC_DIR" /tmp/argocd-diff/argocd-config-custom
          else
            echo "::warning::argocd_config_dir ($SRC_DIR) missing on PR branch — using default image config."
          fi

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          clean: false

      - uses: AutomationDojo/reusable-cicd/.github/actions/argocd-diff-helm-template@fix/argocd-diff
        with:
          helm_chart_path: ${{ inputs.helm_chart_path }}
          helm_values_files: ${{ inputs.helm_values_files }}
          repo_path: ${{ inputs.repo_path }}
          output_dir: /tmp/argocd-diff/base

      - uses: AutomationDojo/reusable-cicd/.github/actions/argocd-diff-run@fix/argocd-diff
        with:
          repo: ${{ github.repository }}
          target_branch: ${{ github.head_ref }}
          base_branch: ${{ inputs.base_branch }}
          github_token: ${{ secrets.GH_PAT }}
          timeout: ${{ inputs.timeout }}
          argocd_chart_version: ${{ inputs.argocd_version }}
          render_method: ${{ inputs.render_method }}
          traverse_app_of_apps: ${{ inputs.traverse_app_of_apps }}
          file_regex: ${{ inputs.file_regex }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          repo_ssh_url: ${{ secrets.REPO_SSH_URL }}
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}
          max_diff_length: ${{ inputs.max_diff_length }}

      - name: Checkout reusable-cicd (PR comment script)
        if: always()
        uses: actions/checkout@v4
        with:
          repository: AutomationDojo/reusable-cicd
          ref: ${{ inputs.reusable_cicd_ref }}
          path: _reusable-cicd
          token: ${{ secrets.GH_PAT }}

      - name: Post diff as PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          DIFF_PATH: /tmp/argocd-diff/output/diff.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('path');
            const scriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              '_reusable-cicd',
              '.github',
              'scripts',
              'post-argocd-diff-comment.js'
            );
            await require(scriptPath)({ github, context });
