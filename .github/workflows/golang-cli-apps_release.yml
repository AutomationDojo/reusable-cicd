# Reusable workflow for releasing Go CLI apps.
# The caller must set `permissions: contents: write`.
name: Release CLI App

on:
  workflow_call:
    inputs:
      homebrew-tap-repo:
        description: "Repository name for the Homebrew tap app token"
        type: string
        default: "homebrew-tap"
      goreleaser-version:
        description: "GoReleaser version to use"
        type: string
        default: "2.14.0"
      node-version:
        description: "Node.js version for semantic-release"
        type: string
        default: "24"
      go-version-file:
        description: "Go version file to use"
        type: string
        default: "go.mod"
      go-sum-file:
        description: "Go sum file to use"
        type: string
        default: "go.sum"
    secrets:
      GITHUB_APP_ID:
        description: "GitHub App ID"
        required: true
      GITHUB_APP_PRIVATE_KEY:
        description: "GitHub App private key"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Setup Git (bot da App)
        run: |
          git config --global user.name "${{ steps.app.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.app.outputs.app-slug }}[bot]@users.noreply.github.com"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}

  goreleaser:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new-release == 'true'
    steps:
      - uses: actions/create-github-app-token@v2
        id: app
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.homebrew-tap-repo }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache-dependency-path: ${{ inputs.go-sum-file }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: ${{ inputs.goreleaser-version }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ needs.release.outputs.version }}
          HOMEBREW_TAP_TOKEN: ${{ steps.app.outputs.token }}
