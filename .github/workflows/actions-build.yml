name: Build Actions

on:
  pull_request:
    branches: [main]
    paths:
      - '**/action.yml'
      - '**/index.js'
      - '**/package*.json'
  push:
    branches: [main]
    paths:
      - '**/action.yml'
      - '**/index.js'
      - '**/package*.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build and commit dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: helm/repo-init/package-lock.json

      - name: Install and build helm/repo-init
        working-directory: helm/repo-init
        run: npm ci && npm run build

      - name: Commit dist to PR branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/repo-init/dist
          git diff --cached --quiet || git commit -m "chore: build action dist [skip ci]"
          git push

      - name: Verify dist is up to date on main
        if: github.event_name == 'push'
        run: |
          git add helm/repo-init/dist
          if ! git diff --cached --quiet; then
            echo "::error::dist/ is out of sync with source. Rebuild and commit the dist/ before merging."
            exit 1
          fi
