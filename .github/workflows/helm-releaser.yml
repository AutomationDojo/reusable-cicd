name: Helm Chart Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: helm-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install chart-releaser
        run: |
          CR_VERSION="v1.8.1"
          curl -sSL https://github.com/helm/chart-releaser/releases/download/${CR_VERSION}/chart-releaser_${CR_VERSION#v}_linux_amd64.tar.gz \
            | tar -xz
          sudo mv cr /usr/local/bin/

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Ensure gh-pages exists
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf .
            echo "# Helm Charts" > README.md
            git add README.md
            git commit -m "init chart repo"
            git push origin gh-pages
            git checkout -
          fi

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages
          cr package charts \
            --package-path .cr-release-packages

      - name: Upload chart release
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=${GITHUB_REPOSITORY%/*}
          REPO=${GITHUB_REPOSITORY#*/}

          cr upload \
            --owner "$OWNER" \
            --git-repo "$REPO" \
            --package-path .cr-release-packages \
            --skip-existing \
            --token "$CR_TOKEN"

      - name: Update Helm repo index
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=${GITHUB_REPOSITORY%/*}
          REPO=${GITHUB_REPOSITORY#*/}

          cr index \
            --owner "$OWNER" \
            --git-repo "$REPO" \
            --package-path .cr-release-packages \
            --index-path index.yaml \
            --push \
            --token "$CR_TOKEN"

      - name: Login to GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to OCI
        if: success()
        run: |
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository }}
          done