name: Helm Releaser

on:
  workflow_call:
    inputs:
      charts_dir:
        description: Directory containing Helm charts
        required: false
        type: string
        default: charts

      config:
        description: chart-releaser config file
        required: false
        type: string

      push_oci:
        description: Push charts to GHCR OCI registry
        required: false
        type: boolean
        default: false

      cr_version:
        description: chart-releaser version
        required: false
        type: string
        default: v1.8.1

    secrets:
      DEVOPS_BUDDY_APP_ID:
        required: true
      DEVOPS_BUDDY_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEVOPS_BUDDY_APP_ID }}
          private-key: ${{ secrets.DEVOPS_BUDDY_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app.outputs.token }}
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install chart-releaser
        run: |
          version="${{ inputs.cr_version }}"
          curl -sSL https://github.com/helm/chart-releaser/releases/download/${version}/chart-releaser_${version#v}_linux_amd64.tar.gz | tar -xz
          sudo mv cr /usr/local/bin/

      - name: Configure Git
        run: |
          git config user.name "${{ steps.app.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf .
            echo "# Helm Charts" > README.md
            git add README.md
            git commit -m "chore: initialize helm repo"
            git push origin gh-pages
            git checkout -
          fi

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages
      
          CONFIG_ARGS=()
          if [[ -n "${{ inputs.config }}" ]]; then
            CONFIG_ARGS+=(--config "${{ inputs.config }}")
          fi
      
          for chart in "${{ inputs.charts_dir }}"/*; do
            if [[ -f "$chart/Chart.yaml" ]]; then
              echo "Packaging chart: $chart"
              cr package "$chart" \
                --package-path .cr-release-packages \
                "${CONFIG_ARGS[@]}"
            fi
          done

      - name: Upload chart releases
        run: |
          OWNER=${GITHUB_REPOSITORY%/*}
          REPO=${GITHUB_REPOSITORY#*/}

          args=(
            --owner "$OWNER"
            --git-repo "$REPO"
            --package-path .cr-release-packages
            --token "${{ steps.app.outputs.token }}"
            --skip-existing
          )

          if [[ -n "${{ inputs.config }}" ]]; then
            args+=(--config "${{ inputs.config }}")
          fi

          cr upload "${args[@]}"

      - name: Update Helm repository index
        run: |
          OWNER=${GITHUB_REPOSITORY%/*}
          REPO=${GITHUB_REPOSITORY#*/}

          args=(
            --owner "$OWNER"
            --git-repo "$REPO"
            --package-path .cr-release-packages
            --index-path index.yaml
            --push
            --token "${{ steps.app.outputs.token }}"
          )

          if [[ -n "${{ inputs.config }}" ]]; then
            args+=(--config "${{ inputs.config }}")
          fi

          cr index "${args[@]}"

      - name: Login to GHCR
        if: inputs.push_oci
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push charts to OCI
        if: inputs.push_oci
        run: |
          shopt -s nullglob
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository }}
          done