# Reusable workflow for simple semantic releases.
# The caller must set `permissions: contents: write`.
name: Simple Semantic Release

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version for semantic-release"
        type: string
        default: "24"
      extra-plugins:
        description: "Newline-separated list of extra semantic-release plugins"
        type: string
        default: |
          @semantic-release/changelog
          @semantic-release/git
      pre-install:
        description: "Shell script to run before semantic-release (e.g. to install extra tools)"
        type: string
        default: ""
      chart-path:
        description: "Path to Helm chart dir (e.g. charts/bootchain-operator). When set, copies shared Helm/Artifact Hub scripts into .github/scripts and installs their deps."
        type: string
        default: ""
      scripts-repo:
        description: "Repo containing shared scripts (used when chart-path is set)"
        type: string
        default: "user-cube/reusable-cicd"
    outputs:
      new-release:
        description: "Whether a new release was published"
        value: ${{ jobs.release.outputs.new-release }}
      version:
        description: "The new release version"
        value: ${{ jobs.release.outputs.version }}
    secrets:
      GITHUB_APP_ID:
        description: "GitHub App ID"
        required: true
      GITHUB_APP_PRIVATE_KEY:
        description: "GitHub App private key"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Setup Git (bot da App)
        run: |
          git config --global user.name "${{ steps.app.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.app.outputs.app-slug }}[bot]@users.noreply.github.com"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Copy shared Helm/Artifact Hub scripts
        if: inputs.chart-path != ''
        run: |
          mkdir -p .github/scripts
          git clone --depth 1 "https://x-access-token:${{ steps.app.outputs.token }}@github.com/${{ inputs.scripts-repo }}.git" .reusable-scripts
          cp .reusable-scripts/.github/scripts/*.py .reusable-scripts/.github/scripts/requirements.txt .github/scripts/
          rm -rf .reusable-scripts

      - name: Install Python deps for Helm/Artifact Hub scripts
        if: inputs.chart-path != ''
        run: pip install -r .github/scripts/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Pre-install tools
        if: inputs.pre-install != ''
        run: ${{ inputs.pre-install }}

      - id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: ${{ inputs.extra-plugins }}
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}
